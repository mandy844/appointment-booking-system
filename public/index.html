<!DOCTYPE html>
<html>
<head>
  <link rel="stylesheet" href="style.css">
  <title>Appointment System</title>
</head>
<body>
  <div class="container">
    <h1>Doctor Appointment System</h1>
    
    <!-- Step 1: Login -->
    <div id="loginSection">
      <h2>Login</h2>
      <input type="text" id="username" placeholder="Username (patient1)">
      <input type="password" id="password" placeholder="Password (pass123)">
      <button onclick="login()">Login</button>
    </div>

    <!-- Dashboard (shown after login) -->
    <div id="dashboard" style="display:none">
      <h2>Welcome, <span id="userName"></span></h2>
      
      <!-- Step 5: Select specialty -->
      <input type="text" id="specialty" placeholder="Specialty (Cardiology, Dermatology, Neurology)">
      <button onclick="loadDoctors()">Show Doctors</button>
      
      <!-- Step 8: Display doctors + slots -->
      <div id="doctorsList"></div>
      
      <!-- Booking form (step 12a) -->
      <div id="bookingForm" style="display:none">
        <h3>Confirm Appointment</h3>
        <input type="text" id="patientEmail" placeholder="Email">
        <input type="text" id="patientPhone" placeholder="Phone">
        <button onclick="confirmBooking()">Submit Booking</button>
      </div>
    </div>
  </div>
  
  <script src="script.js"></script>
</body>
</html>
